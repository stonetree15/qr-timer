<!DOCTYPE html>
<html>
<head>
  <title>QR Timer Generator</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
      background: #f5f5f5;
    }

    input, select {
      padding: 8px;
      font-size: 16px;
      margin: 5px;
    }

    button {
      padding: 10px 14px;
      font-size: 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin: 5px;
    }

    #generate { background: green; color: white; }
    #download { background: dodgerblue; color: white; }
    #copy { background: orange; color: white; }

    img {
      margin-top: 20px;
      width: 220px;
      height: 220px;
      border: 1px solid #ccc;
      background: white;
    }
  </style>
</head>

<body>

<h2>QR Timer Generator</h2>

<label>Minuten:</label>
<input type="number" id="minutes" value="1" min="0"><br>

<label>Seconden:</label>
<input type="number" id="seconds" value="30" min="0" max="59"><br>

<br>

<label>Geluid:</label>
<select id="soundSelect">
  <option value="https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg">
    Digital Watch (default)
  </option>

  <option value="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg">
    Alarm Clock
  </option>

  <option value="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
    Beep
  </option>
</select>

<br><br>

<button id="generate" onclick="generateQR()">Genereer QR</button>
<button id="download" onclick="downloadQR()">Download</button>
<button id="copy" onclick="copyQR()">Kopieer</button>

<br>

<img id="qr">

<script>
let lastQRUrl = "";

function generateQR() {
  let min = document.getElementById("minutes").value;
  let sec = document.getElementById("seconds").value;
  let sound = document.getElementById("soundSelect").value;

  let baseUrl = "https://stonetree15.github.io/qr-timer/timer.html";

  let url =
    baseUrl +
    `?m=${min}&s=${sec}&sound=${encodeURIComponent(sound)}`;

  lastQRUrl = "https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=" +
    encodeURIComponent(url);

  document.getElementById("qr").src = lastQRUrl;
}

function downloadQR() {
  if (!lastQRUrl) return;

  fetch(lastQRUrl)
    .then(res => res.blob())
    .then(blob => {
      let link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "qr-timer.png";
      link.click();
    });
}

function copyQR() {
  if (!lastQRUrl) return;

  fetch(lastQRUrl)
    .then(res => res.blob())
    .then(blob => {
      navigator.clipboard.write([
        new ClipboardItem({ "image/png": blob })
      ]);
      alert("QR gekopieerd!");
    })
    .catch(() => {
      alert("Kopiëren niet ondersteund in deze browser");
    });
}
</script>

</body>
</html>
