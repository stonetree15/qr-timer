<!DOCTYPE html>
<html>
<head>
  <title>QR Timer</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 40px;
      background: #f5f5f5;
    }

    .container {
      position: relative;
      width: 300px;
      height: 300px;
      margin: auto;
    }

    svg {
      transform: rotate(-90deg);
    }

    circle {
      fill: none;
      stroke-width: 20;
    }

    .bg {
      stroke: #ddd;
    }

    .progress {
      stroke: red;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s linear;
    }

    #timerText {
      position: absolute;
      top: 120px;
      left: 0;
      right: 0;
      font-size: 45px;
      font-weight: bold;
    }

    button {
      font-size: 16px;
      padding: 10px 18px;
      margin: 6px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    #play { background: green; color: white; }
    #reset { background: gold; }
    #stop { background: red; color: white; }

    #hint {
      font-size: 14px;
      color: #555;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>Timer</h1>

<div class="container">
  <svg width="300" height="300">
    <circle class="bg" cx="150" cy="150" r="120"></circle>
    <circle class="progress" cx="150" cy="150" r="120"></circle>
  </svg>
  <div id="timerText">0:00</div>
</div>

<div id="hint">Tik op Play om timer te starten (geluid activeren)</div>

<br>

<button id="play" onclick="startTimer()">▶ Play</button>
<button id="reset" onclick="resetTimer()">🔄 Reset</button>
<button id="stop" onclick="stopAlarm()">⛔ Stop</button>

<audio id="alarmSound" preload="auto"></audio>

<script>
let params = new URLSearchParams(window.location.search);

let startMin = parseInt(params.get("m")) || 0;
let startSec = parseInt(params.get("s")) || 0;

let totalStart = startMin * 60 + startSec;
let total = totalStart;

let interval = null;
let alarmTimeout = null;

let soundUrl =
  params.get("sound") ||
  "https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg";

let alarmSound = document.getElementById("alarmSound");
alarmSound.src = soundUrl;

// 🔵 circle setup
let circle = document.querySelector(".progress");
let radius = 120;
let circumference = 2 * Math.PI * radius;

circle.style.strokeDasharray = circumference;
circle.style.strokeDashoffset = 0;

// ⏱ update UI
function updateDisplay() {
  let m = Math.floor(total / 60);
  let s = total % 60;

  document.getElementById("timerText").innerText =
    m + ":" + (s < 10 ? "0" : "") + s;

  let progress = totalStart > 0 ? total / totalStart : 0;
  let offset = circumference * (1 - progress);

  circle.style.strokeDashoffset = offset;
}

// ▶ start timer (Apple fix inbegrepen)
function startTimer() {
  if (interval) return;

  // 🔓 Apple audio unlock
  alarmSound.play().then(() => {
    alarmSound.pause();
    alarmSound.currentTime = 0;
  }).catch(() => {});

  interval = setInterval(() => {
    if (total > 0) {
      total--;
      updateDisplay();
    } else {
      clearInterval(interval);
      interval = null;
      startAlarm();
    }
  }, 1000);
}

// 🔔 alarm
function startAlarm() {
  alarmSound.loop = true;

  alarmSound.play().catch(() => {
    console.log("Audio blocked until user interaction");
  });

  alarmTimeout = setTimeout(() => {
    stopAlarm(true);
  }, 10000);
}

// ⛔ stop alarm
function stopAlarm(autoReset = false) {
  alarmSound.pause();
  alarmSound.currentTime = 0;

  clearTimeout(alarmTimeout);

  resetTimer();
}

// 🔄 reset
function resetTimer() {
  clearInterval(interval);
  interval = null;

  alarmSound.pause();
  alarmSound.currentTime = 0;

  total = totalStart;
  updateDisplay();
}

updateDisplay();
</script>

</body>
</html>
