<!DOCTYPE html>
<html>
<head>
  <title>Timer</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 40px;
      background: #f5f5f5;
    }

    #timerText {
      position: absolute;
      top: 135px;
      left: 0;
      right: 0;
      font-size: 40px;
      font-weight: bold;
    }

    .container {
      position: relative;
      width: 300px;
      height: 300px;
      margin: auto;
    }

    svg {
      transform: rotate(-90deg);
    }

    circle {
      fill: none;
      stroke-width: 20;
    }

    .bg {
      stroke: #ddd;
    }

    .progress {
      stroke: red;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s linear;
    }

    button {
      font-size: 16px;
      padding: 10px 18px;
      margin: 6px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    #play { background: green; color: white; }
    #reset { background: gold; }
    #stop { background: red; color: white; }

    select {
      padding: 8px;
      font-size: 14px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>Timer</h1>

<div class="container">
  <svg width="300" height="300">
    <circle class="bg" cx="150" cy="150" r="120"></circle>
    <circle class="progress" cx="150" cy="150" r="120"></circle>
  </svg>
  <div id="timerText">0:00</div>
</div>

<br>

<button id="play" onclick="startTimer()">▶ Play</button>
<button id="reset" onclick="resetTimer()">🔄 Reset</button>
<button id="stop" onclick="stopAlarm()">⛔ Stop</button>

<br><br>

<!-- 🎵 Sound selector -->
<select id="soundSelect">
  <option value="https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg">
    Digital Watch Alarm (default)
  </option>

  <option value="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg">
    Classic Alarm Clock
  </option>

  <option value="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
    Short Beep
  </option>
</select>

<button onclick="previewSound()">▶ Preview</button>

<audio id="alarmSound" preload="auto"></audio>

<script>
let params = new URLSearchParams(window.location.search);
let startMin = parseInt(params.get("m")) || 0;
let startSec = parseInt(params.get("s")) || 0;

let totalStart = startMin * 60 + startSec;
let total = totalStart;

let interval = null;
let alarmTimeout = null;

let alarmSound = document.getElementById("alarmSound");

let circle = document.querySelector(".progress");
let radius = 120;
let circumference = 2 * Math.PI * radius;

circle.style.strokeDasharray = circumference;

function updateSound() {
  let select = document.getElementById("soundSelect");
  alarmSound.src = select.value;
}

document.getElementById("soundSelect").addEventListener("change", updateSound);
updateSound();

function updateDisplay() {
  let m = Math.floor(total / 60);
  let s = total % 60;

  document.getElementById("timerText").innerText =
    m + ":" + (s < 10 ? "0" : "") + s;

  let progress = total / totalStart;
  let offset = circumference * (1 - progress);
  circle.style.strokeDashoffset = offset;
}

function startTimer() {
  if (interval) return;

  interval = setInterval(() => {
    if (total > 0) {
      total--;
      updateDisplay();
    } else {
      clearInterval(interval);
      interval = null;
      startAlarm();
    }
  }, 1000);
}

function startAlarm() {
  alarmSound.loop = true;
  alarmSound.play();

  alarmTimeout = setTimeout(() => {
    stopAlarm(true);
  }, 10000);
}

function stopAlarm(autoReset = false) {
  alarmSound.pause();
  alarmSound.currentTime = 0;

  clearTimeout(alarmTimeout);

  resetTimer();
}

function resetTimer() {
  clearInterval(interval);
  interval = null;

  alarmSound.pause();
  alarmSound.currentTime = 0;

  total = totalStart;
  updateDisplay();
}

function previewSound() {
  updateSound();
  alarmSound.loop = false;
  alarmSound.currentTime = 0;
  alarmSound.play();

  setTimeout(() => {
    alarmSound.pause();
    alarmSound.currentTime = 0;
  }, 3000);
}

updateDisplay();
</script>

</body>
</html>
