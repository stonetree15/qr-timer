<!DOCTYPE html>
<html>
<head>
  <title>Timer</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 60px;
      background: #f5f5f5;
    }

    #timer {
      font-size: 70px;
      margin: 30px;
      font-weight: bold;
    }

    button {
      font-size: 18px;
      padding: 12px 22px;
      margin: 10px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }

    #play { background: green; color: white; }
    #reset { background: gold; }
    #stop { background: red; color: white; }
  </style>
</head>

<body>

<h1>Timer</h1>
<div id="timer">0:00</div>

<button id="play" onclick="startTimer()">▶ Play</button>
<button id="reset" onclick="resetTimer()">🔄 Reset</button>
<button id="stop" onclick="stopAlarm()">⛔ Stop Alarm</button>

<!-- 🔔 echte ringtone (keukenwekker geluid) -->
<audio id="alarmSound" preload="auto">
  <source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg" type="audio/ogg">
</audio>

<script>
let params = new URLSearchParams(window.location.search);
let startMin = parseInt(params.get("m")) || 0;
let startSec = parseInt(params.get("s")) || 0;

let totalStart = startMin * 60 + startSec;
let total = totalStart;

let interval = null;
let alarmInterval = null;
let alarmTimeout = null;

let alarmSound = document.getElementById("alarmSound");

function updateDisplay() {
  let m = Math.floor(total / 60);
  let s = total % 60;
  document.getElementById("timer").innerText =
    m + ":" + (s < 10 ? "0" : "") + s;
}

function startTimer() {
  if (interval) return;

  interval = setInterval(() => {
    if (total > 0) {
      total--;
      updateDisplay();
    } else {
      clearInterval(interval);
      interval = null;
      startAlarm();
    }
  }, 1000);
}

function startAlarm() {
  // start geluid
  alarmSound.loop = true;
  alarmSound.play();

  // automatische stop na 10 sec
  alarmTimeout = setTimeout(() => {
    stopAlarm(true);
  }, 10000);
}

function stopAlarm(autoReset = false) {
  alarmSound.pause();
  alarmSound.currentTime = 0;

  clearTimeout(alarmTimeout);
  alarmTimeout = null;

  if (autoReset) {
    resetTimer();
  } else {
    resetTimer();
  }
}

function resetTimer() {
  clearInterval(interval);
  interval = null;

  alarmSound.pause();
  alarmSound.currentTime = 0;

  total = totalStart;
  updateDisplay();
}

updateDisplay();
</script>

</body>
</html>
